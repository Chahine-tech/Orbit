<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="dot" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundclip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Everything clipped to rounded rect — corners are transparent -->
  <g clip-path="url(#roundclip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <ellipse cx="512" cy="512" rx="300" ry="300"
      fill="none" stroke="#7c3aed" stroke-width="6" stroke-opacity="0.35"/>

    <ellipse cx="512" cy="512" rx="300" ry="100"
      fill="none" stroke="#a78bfa" stroke-width="5" stroke-opacity="0.6"
      transform="rotate(-30 512 512)"/>

    <circle cx="512" cy="512" r="110" fill="url(#core)" filter="url(#glow)"/>
    <ellipse cx="480" cy="478" rx="48" ry="32" fill="white" fill-opacity="0.12"/>

    <circle cx="724" cy="370" r="32" fill="url(#dot)" filter="url(#dotglow)"/>
    <circle cx="716" cy="362" r="10" fill="white" fill-opacity="0.4"/>
  </g>
</svg>
